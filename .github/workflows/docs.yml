# .github/workflows/docs.yml
name: Deploy Docs
on:
  push:
    branches: [main]
    paths: ['docs/**', 'mkdocs.yml', 'gesture_controller/**', '.github/workflows/docs.yml', 'pyproject.toml']
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7

      - name: Build and Deploy MkDocs
        env:
          PYTHONPATH: .
        run: |
          uv tool run --with mkdocs-material --with mkdocstrings-python --with mkdocs-git-revision-date-localized-plugin --with mkdocs-minify-plugin mkdocs gh-deploy --force
