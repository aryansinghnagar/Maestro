# .github/workflows/docs.yml
name: Deploy Docs
on:
  push:
    branches: [main]
    paths: ['docs/**', 'mkdocs.yml', 'gesture_controller/**', '.github/workflows/docs.yml', 'pyproject.toml']
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Build MkDocs Site
        run: |
          uv tool run --with mkdocs-material --with "mkdocstrings[python]" --with mkdocs-git-revision-date-localized-plugin --with mkdocs-minify-plugin --with mkdocs-tagging-plugin mkdocs build
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
