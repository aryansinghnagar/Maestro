name: Release Builder

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build and Package Release
    runs-on: windows-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python_version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
          pip install cyclonedx-python-lib

      - name: Generate CycloneDX SBOM
        run: |
          cyclonedx-py poetry --outfile sbom.json --format json || cyclonedx-py requirements --outfile sbom.json --format json

      - name: Build Executable via PyInstaller
        run: |
          pip install pyinstaller
          pyinstaller --onefile --noconsole --name Maestro gesture_controller/main.py

      - name: Code Sign (Windows)
        shell: powershell
        run: |
          # Azure Key Vault Code Signing simulation/placeholder
          if ("${{ secrets.AZURE_CLIENT_ID }}" -ne "") {
            echo "Running Azure SignTool..."
            # dotnet tool install --global SignTool
            # signtool sign-svs ...
          } else {
            echo "Skipping Windows signing: Secrets not configured."
          }

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign Executable with Cosign (Keyless)
        run: |
          cosign sign-blob --yes --output-signature dist/Maestro.exe.sig --output-certificate dist/Maestro.exe.pem dist/Maestro.exe

      - name: Generate Hashes for SLSA Generic Generator
        id: hash
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist/Maestro.exe -Algorithm SHA256).Hash.ToLower()
          $filename = "Maestro.exe"
          $subject = "$hash  $filename"
          $base64 = [Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes($subject))
          echo "hashes=$base64" >> $env:GITHUB_OUTPUT

      - name: Upload SBOM and Binaries
        uses: actions/upload-artifact@v4
        with:
          name: Maestro-Windows-Artifacts
          path: |
            dist/Maestro.exe
            dist/Maestro.exe.sig
            dist/Maestro.exe.pem
            sbom.json

  provenance:
    needs: build
    name: Generate SLSA Build Provenance
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v1.9.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: true
