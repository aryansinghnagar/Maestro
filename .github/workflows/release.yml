name: Release Builder

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build and Package Release
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python_version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
          pip install cyclonedx-python-lib

      - name: Generate CycloneDX SBOM
        run: |
          cyclonedx-py poetry --outfile sbom.json --format json || cyclonedx-py requirements --outfile sbom.json --format json

      - name: Build Executable via PyInstaller
        run: |
          pip install pyinstaller
          pyinstaller --onefile --noconsole --name Maestro gesture_controller/main.py

      - name: Code Sign (Windows)
        shell: powershell
        run: |
          # Azure Key Vault Code Signing simulation/placeholder
          if ("${{ secrets.AZURE_CLIENT_ID }}" -ne "") {
            echo "Running Azure SignTool..."
            # dotnet tool install --global SignTool
            # signtool sign-svs ...
          } else {
            echo "Skipping Windows signing: Secrets not configured."
          }

      - name: Upload SBOM and Binaries
        uses: actions/upload-artifact@v4
        with:
          name: Maestro-Windows-Artifacts
          path: |
            dist/Maestro.exe
            sbom.json

  provenance:
    needs: build
    name: Generate SLSA Build Provenance
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v1.9.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: true
