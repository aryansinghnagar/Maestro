name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Development Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run Black Formatter Check
        run: black --check gesture_controller/

      - name: Run Mypy Type Checking
        run: mypy gesture_controller/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pip-audit safety bandit semgrep

      - name: Run Bandit (Static Analysis)
        run: bandit -r gesture_controller/ -x gesture_controller/tests/

      - name: Run Pip-Audit (Dependency Vulnerabilities)
        run: pip-audit

      - name: Run Safety Check
        run: safety check

      - name: Run Semgrep (SAST Scan)
        run: semgrep scan --config=auto --error

  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python-version }})
    needs: [lint-and-typecheck]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Set up headless display (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libegl1-mesa libgl1-mesa-glx
          echo "DISPLAY=:99" >> $GITHUB_ENV
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run Test Suite
        # Skip real_mediapipe in CI matrix since model and webcam hardware are not fully integrated on generic virtual machines
        run: python -m pytest -m "not real_mediapipe"
