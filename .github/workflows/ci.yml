name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify CI workflow triggers on main
        run: |
          python -c "
          import yaml
          with open('.github/workflows/ci.yml') as f:
              w = yaml.safe_load(f)
          on = w['on'] if 'on' in w else w[True]
          push_branches = on.get('push', {}).get('branches', [])
          pr_branches = on.get('pull_request', {}).get('branches', [])
          assert 'main' in push_branches, f'push.branches must contain main, got {push_branches}'
          assert 'main' in pr_branches, f'pull_request.branches must contain main, got {pr_branches}'
          print('CI workflow trigger validation passed!')
          "

  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install black mypy

      - name: Run Black Formatter Check
        run: black --check gesture_controller/

      - name: Run Mypy Type Checking
        run: mypy --config-file pyproject.toml gesture_controller/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pip-audit bandit

      - name: Run Bandit (MEDIUM+ only)
        # -ll: fail only on MEDIUM and HIGH
        # -q: quiet (only print issues)
        run: bandit -r gesture_controller/ -x gesture_controller/tests/ -ll -q

      - name: Run Pip-Audit
        run: pip-audit || true

  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Set up headless display and GPU libs (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb \
            portaudio19-dev libasound2-dev \
            libegl1 libgl1 libgles2 \
            libglib2.0-0 libfontconfig1 libdbus-1-3 \
            libxkbcommon0 libxkbcommon-x11-0
          echo "DISPLAY=:99" >> $GITHUB_ENV
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run pywin32 post-install (Windows only)
        if: matrix.os == 'windows-latest'
        run: python -c "import pywin32_postinstall; pywin32_postinstall.install()" || true

      - name: Run Test Suite
        # Exclude tests that need real MediaPipe native libs, hardware, or are slow
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest -m "not real_mediapipe and not requires_hardware and not slow" --cov=gesture_controller --cov-fail-under=70 --junitxml=pytest.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.os }}-${{ matrix.python-version }}
          path: pytest.xml
          retention-days: 7

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
