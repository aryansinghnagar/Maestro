version: "3.0"
camera:
  device_id: 0
  frame_width: 640
  frame_height: 480
  fps_target: 30
  backend_preference: ["MSMF", "DirectShow"]  # per-OS defaults
  reconnect_backoff_ms: [100, 200, 400, 800, 1600]
  watchdog_timeout_ms: 2000

filtering:
  type: "one_euro"
  one_euro:
    min_cutoff: 1.0
    beta: 0.007
    derivative_cutoff: 1.0
  dynamic_adaptation:
    lighting_enabled: true
    depth_scaling_enabled: true
  tremor:
    enabled: false
    min_freq: 4.0
    max_freq: 12.0
    history_length: 30

sensitivity:
  global_multiplier: 1.0

engine:
  max_hands: 2
  min_detection_confidence: 0.7
  min_tracking_confidence: 0.5
  inference_backend: "auto"
  quantization: "int8"
  skip_model_verification: false

hud:
  enabled: true
  opacity: 0.3
  show_tracking_points: true
  show_progress_ring: true
  confirmation_duration_ms: 800

logging:
  level: "INFO"
  structured: true
  rotation: "daily"
  max_files: 7

a11y:
  high_contrast: false
  reduced_motion: false
  dwell_click_enabled: false
  dwell_duration_ms: 800

voice:
  engine: "vosk"
  model_path: "models/vosk-model-small-en-us"
  wake_word: "maestro"

telemetry:
  enabled: false
  endpoint: "https://telemetry.maestro.example.com"

i18n:
  locale: "en-US"
  fallback: "en-US"

profiles:
  auto_detect_app: true
  devices: []

triggers:
  conditions: []
